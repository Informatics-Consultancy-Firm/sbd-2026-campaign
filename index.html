<!DOCTYPE html>    
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-learning · SBD ITNs · Sierra Leone 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#004080; --navy-700:#003468; --navy-900:#012a52;
    --gold:#ffc107; --gold-600:#e0a800;
    --ink:#12233b; --muted:#5c7089; --line:#e2e9f2; --bg:#f4f7fb; --white:#fff;
    --sh-sm:0 2px 8px rgba(0,64,128,.08); --sh-md:0 12px 30px rgba(0,64,128,.14); --sh-lg:0 26px 60px rgba(0,64,128,.28);
    --disp:'Oswald',system-ui,sans-serif; --body:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:var(--body);color:var(--ink);background:#ffffff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px 16px;}
  a{text-decoration:none;color:inherit;}

  .stage{display:flex;gap:26px;align-items:flex-start;justify-content:center;flex-wrap:wrap;max-width:100%;}
  .col{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .lang-label{display:inline-flex;align-items:center;gap:8px;font:600 12px var(--body);letter-spacing:.08em;text-transform:uppercase;color:var(--navy);background:var(--bg);border:1px solid var(--line);padding:8px 16px;border-radius:99px;}
  .lang-label .fl{font-size:15px;}

  .phone{width:360px;max-width:92vw;height:780px;max-height:82vh;background:#0a1c30;border-radius:44px;padding:11px;box-shadow:var(--sh-lg);}
  .screen{position:relative;width:100%;height:100%;background:var(--bg);border-radius:34px;overflow:hidden;display:flex;flex-direction:column;}

  .top{flex:0 0 auto;background:var(--white);border-bottom:3px solid var(--navy);display:flex;align-items:center;gap:10px;padding:11px 14px;box-shadow:var(--sh-sm);z-index:10;}
  .top .logo{height:36px;width:auto;display:block;}
  .top .brand{border-left:2px solid var(--line);padding-left:10px;min-width:0;}
  .top .brand .n{font:600 13px/1 var(--disp);letter-spacing:.03em;color:var(--navy);text-transform:uppercase;}
  .top .brand .s{font:500 8.5px/1.2 var(--body);color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .top .home-link{margin-left:auto;font:600 11px var(--body);color:var(--navy);display:none;align-items:center;gap:5px;cursor:pointer;padding:7px 10px;border-radius:9px;border:1.5px solid var(--line);flex:0 0 auto;}
  .top .home-link.show{display:inline-flex;}

  .body{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}

  .hero{background:linear-gradient(155deg,var(--navy),var(--navy-900));color:#fff;border-radius:0 0 24px 24px;position:relative;overflow:hidden;padding:22px 18px 26px;}
  .hero::after{content:"";position:absolute;right:-50px;top:-60px;width:170px;height:170px;border-radius:50%;background:rgba(255,193,7,.13);}
  .hero .tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.22);padding:5px 11px;border-radius:99px;font:600 9px var(--body);letter-spacing:.06em;text-transform:uppercase;position:relative;}
  .hero .tag .g{width:6px;height:6px;border-radius:50%;background:var(--gold);}
  .hero h1{font:600 22px/1.18 var(--disp);letter-spacing:.01em;margin:12px 0 10px;position:relative;}
  .hero h1 span{color:var(--gold);}
  .hero p{font:400 12px/1.6 var(--body);color:rgba(255,255,255,.92);position:relative;}
  .hero .stats{display:flex;gap:18px;margin-top:18px;position:relative;}
  .hero .stats .st .v{font:700 19px/1 var(--disp);color:var(--gold);}
  .hero .stats .st .k{font:500 9.5px var(--body);color:rgba(255,255,255,.82);margin-top:4px;}

  .wrap{padding:0 15px;}
  .sec-head{display:flex;align-items:baseline;gap:10px;margin:20px 2px 14px;}
  .sec-head h2{font:600 17px/1 var(--disp);letter-spacing:.02em;color:var(--navy);}
  .sec-head .bar{flex:1;height:2px;background:var(--line);}
  .sec-head .count{font:600 10.5px var(--body);color:var(--muted);}

  .grid{display:flex;flex-direction:column;gap:12px;padding-bottom:26px;}
  .mod{background:var(--white);border:1px solid var(--line);border-radius:15px;box-shadow:var(--sh-sm);cursor:pointer;overflow:hidden;position:relative;transition:transform .12s,box-shadow .2s,border-color .2s;}
  .mod::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--navy);}
  .mod:active{transform:scale(.99);}
  .mod .body2{padding:15px 15px 15px 19px;}
  .mod .num{font:700 10px var(--disp);letter-spacing:.1em;color:var(--gold-600);}
  .mod h3{font:600 16px/1.22 var(--disp);color:var(--ink);margin:5px 0 7px;}
  .mod p{font:400 11.5px/1.5 var(--body);color:var(--muted);}
  .mod .foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:11px;border-top:1px solid var(--line);}
  .mod .foot .sub{font:600 10px var(--body);color:var(--muted);}
  .mod .foot .go{display:inline-flex;align-items:center;gap:5px;font:600 11px var(--body);color:var(--navy);}

  .detail{padding-bottom:28px;animation:fade .3s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .dhero{background:linear-gradient(150deg,var(--navy),var(--navy-700));color:#fff;border-radius:16px;padding:18px;margin:16px 0 16px;position:relative;overflow:hidden;}
  .dhero::after{content:"";position:absolute;right:-40px;top:-50px;width:130px;height:130px;border-radius:50%;background:rgba(255,193,7,.15);}
  .dhero .num{font:700 10px var(--disp);letter-spacing:.12em;color:var(--gold);position:relative;}
  .dhero h2{font:600 20px/1.18 var(--disp);margin:6px 0 8px;position:relative;}
  .dhero p{font:400 12px/1.6 var(--body);color:rgba(255,255,255,.9);position:relative;}

  .subs{display:flex;flex-direction:column;gap:11px;}
  .sub-card{background:var(--white);border:1px solid var(--line);border-radius:15px;box-shadow:var(--sh-sm);padding:16px;display:flex;flex-direction:column;}
  .sub-card:active{transform:scale(.99);}
  .sub-card .ic{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;margin-bottom:11px;}
  .ic.ppt{background:#fdeede;color:#d1671a;} .ic.vid{background:#e7effb;color:var(--navy);}
  .ic.ass{background:#fff6d9;color:var(--gold-600);} .ic.dat{background:#e4f5ec;color:#1f9d6b;}
  .sub-card .step{font:700 10px var(--disp);letter-spacing:.1em;color:var(--muted);}
  .sub-card h4{font:600 16px/1.2 var(--disp);margin:4px 0 6px;}
  .sub-card p{font:400 11.5px/1.5 var(--body);color:var(--muted);margin-bottom:13px;}
  .sub-card .btn{margin-top:auto;}
  .sub-card .btn{border:none;border-radius:11px;padding:12px 14px;font:600 13px var(--body);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .08s,filter .2s;}
  .sub-card .btn:active{transform:translateY(1px);}
  .btn-navy{background:var(--navy);color:#fff;} .btn-gold{background:var(--gold);color:var(--navy-900);}
  .btn-green{background:#1f9d6b;color:#fff;} .btn-orange{background:#d1671a;color:#fff;}

  .player{background:#000;border-radius:15px;overflow:hidden;box-shadow:var(--sh-md);display:none;}
  .player.show{display:block;animation:fade .3s ease;}
  .player video{width:100%;display:block;max-height:40vh;background:#000;}
  .player .pbar{background:var(--navy-900);color:#fff;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;font:600 11px var(--body);}
  .player .pbar button{background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:5px 10px;font:600 11px var(--body);cursor:pointer;}

  footer{background:var(--navy-900);color:rgba(255,255,255,.7);text-align:center;padding:18px;font:400 10.5px var(--body);}
  footer b{color:#fff;font-weight:600;}

  .hint{margin-top:16px;font:500 12px var(--body);color:var(--muted);text-align:center;}
  .live-layout{display:flex;gap:20px;align-items:stretch;justify-content:center;flex-wrap:nowrap;max-width:100%;width:100%;}
  .panel{flex:1 1 260px;min-width:230px;max-width:420px;background:var(--white);border:1px solid var(--line);border-radius:18px;box-shadow:var(--sh-md);display:flex;flex-direction:column;overflow:hidden;align-self:stretch;}
  .panel-en{border-top:4px solid var(--navy);} .panel-fr{border-top:4px solid var(--gold);}
  .panel-h{background:var(--bg);border-bottom:1px solid var(--line);padding:14px 16px;font:700 12px var(--body);letter-spacing:.1em;text-transform:uppercase;color:var(--navy);display:flex;align-items:center;gap:8px;}
  .panel-fr .panel-h{color:var(--gold-600);}
  .panel-h .dotp{width:9px;height:9px;border-radius:50%;background:#c7d3e2;}
  .panel.recording .panel-h .dotp{background:#d1495b;animation:pulse 1.1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .panel-body{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px;}
  .panel-body .ph{color:var(--muted);font:400 14px/1.5 var(--body);margin:auto;text-align:center;}
  .panel-body .line{font:500 18px/1.5 var(--body);color:var(--ink);padding-bottom:9px;border-bottom:1px dashed var(--line);}
  .panel-body .line:last-child{border-bottom:none;}
  .panel-body .line.interim{color:var(--muted);font-weight:400;font-style:italic;border-bottom:none;}
  .panel-fr .panel-body .line{color:var(--navy-900);}
  .cursor{position:absolute;width:24px;height:24px;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:0;transition:opacity .18s;z-index:40;box-shadow:0 0 0 3px rgba(255,255,255,.7),0 3px 8px rgba(0,0,0,.25);}
  .cursor::after{content:"";position:absolute;left:50%;top:50%;width:5px;height:5px;border-radius:50%;transform:translate(-50%,-50%);background:currentColor;}
  .cursor-en{color:#1c66c9;background:rgba(28,102,201,.28);border:2.5px solid #1c66c9;}
  .cursor-fr{color:#d1495b;background:rgba(209,73,91,.28);border:2.5px solid #d1495b;}
  .cursor.on{opacity:1;}
  @media(max-width:900px){ .live-layout{flex-wrap:wrap;} .panel{flex:1 1 100%;max-width:none;order:3;min-height:150px;max-height:34vh;} }
  .controls{margin-top:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center;}
  .cap-btn{background:var(--navy);color:#fff;border:none;border-radius:12px;padding:13px 22px;font:600 14px var(--body);cursor:pointer;box-shadow:var(--sh-sm);transition:filter .2s,transform .08s;}
  .cap-btn:active{transform:translateY(1px);} .cap-btn:hover{filter:brightness(1.1);}
  .cap-btn.live{background:#d1495b;}
  .cap-status{font:500 12.5px var(--body);color:var(--muted);}
  @media(max-width:820px){ .phone{height:74vh;} }
</style>
</head>

  var t=T[lang], m=MODULES[i], mm=m[lang];
  var subs=SUBS.map(function(s){
    var ss=s[lang];
    return '<div class="sub-card sa" data-sync="sub-'+s.key+'"><div class="ic '+s.ic+'">'+IC[s.ic]+'</div>'+
      '<div class="step">'+esc(ss.step)+'</div><h4 data-sync="subt-'+s.key+'">'+esc(ss.title)+'</h4><p data-sync="subd-'+s.key+'">'+esc(ss.desc)+'</p>'+
      '<button class="btn '+s.cls+'" data-sync="subbtn-'+s.key+'" onclick="openSub(\''+s.key+'\','+i+',this)">'+esc(ss.btn)+'</button></div>';
  }).join("");
  return '<div class="wrap"><div class="detail">'+
    '<div class="dhero sa" data-sync="dhero"><div class="num">MODULE '+String(i+1).padStart(2,"0")+'</div><h2 data-sync="dtitle">'+esc(mm.title)+'</h2><p data-sync="ddesc">'+esc(mm.desc)+'</p></div>'+
    '<div class="subs">'+subs+
      '<div class="player"><div class="pbar"><span>'+t.videoWord+' \u00B7 '+esc(mm.title)+'</span><button onclick="closePlayer(this)">'+t.close+' \u00D7</button></div><video controls preload="metadata"></video></div>'+
    '</div></div></div>';
}

function renderHome(side){ side.view.innerHTML=homeHTML(side.lang); side.back.classList.remove("show"); }
function renderModule(side,i){ side.view.innerHTML=moduleHTML(side.lang,i); side.back.classList.add("show"); }

function goHome(){ ["L","R"].forEach(function(k){renderHome(sides[k]); sides[k].scroll.scrollTop=0;}); afterRender(); }
function goModule(i){ ["L","R"].forEach(function(k){renderModule(sides[k],i); sides[k].scroll.scrollTop=0;}); afterRender(); }
function afterRender(){ requestAnimationFrame(function(){ equalizeCards(); requestAnimationFrame(equalizeCards); }); }

/* make each English/French twin block the same height so sections line up */
function equalizeCards(){
  var s=document.querySelectorAll(".screen"); if(s.length<2) return;
  var A=s[0].querySelectorAll(".sa"), B=s[1].querySelectorAll(".sa");
  if(!A.length || A.length!==B.length) return;
  for(var i=0;i<A.length;i++){ A[i].style.minHeight="0px"; B[i].style.minHeight="0px"; }
  for(var j=0;j<A.length;j++){
    var h=Math.max(A[j].offsetHeight, B[j].offsetHeight);
    A[j].style.minHeight=h+"px"; B[j].style.minHeight=h+"px";
  }
}
var _eqT; window.addEventListener("resize",function(){ clearTimeout(_eqT); _eqT=setTimeout(equalizeCards,150); });
if(document.fonts && document.fonts.ready){ document.fonts.ready.then(function(){ equalizeCards(); }); }
window.addEventListener("load", function(){ setTimeout(equalizeCards, 200); });

function openSub(key,i,btn){
  var m=MODULES[i];
  var sub=null; for(var j=0;j<SUBS.length;j++){ if(SUBS[j].key===key){ sub=SUBS[j]; break; } }
  var url=m.folder+"/"+sub.file;
  if(key==="video"){
    var card=btn.closest(".subs");
    var p=card.querySelector(".player"), v=card.querySelector("video");
    v.src=url; p.classList.add("show"); p.scrollIntoView({behavior:"smooth",block:"center"}); v.play().catch(function(){});
    return;
  }
  window.open(url,"_blank");
}
function closePlayer(btn){ var p=btn.closest(".player"), v=p.querySelector("video"); v.pause(); v.removeAttribute("src"); v.load(); p.classList.remove("show"); }

/* nav wiring */
sides.L.back.onclick=goHome; sides.R.back.onclick=goHome;
sides.L.sub.textContent=T.en.sub; sides.R.sub.textContent=T.fr.sub;
sides.L.foot.innerHTML="\u00A9 "+YR+" <b>ICF-SL</b> \u00B7 "+T.en.footer;
sides.R.foot.innerHTML="\u00A9 "+YR+" <b>ICF-SL</b> \u00B7 "+T.fr.footer;

/* ---------- synced scrolling ---------- */
var lock=false;
function anchTops(sc){
  var base=sc.getBoundingClientRect().top, st=sc.scrollTop;
  return Array.prototype.map.call(sc.querySelectorAll(".sa"),function(el){
    return el.getBoundingClientRect().top - base + st;
  });
}
function maxScroll(sc){ return Math.max(0, sc.scrollHeight - sc.clientHeight); }
function mirror(from,to){
  if(lock) return; lock=true;
  var a=anchTops(from), b=anchTops(to);
  if(a.length && a.length===b.length){
    var y=from.scrollTop, idx=0;
    for(var i=0;i<a.length;i++){ if(a[i]<=y+2) idx=i; else break; }
    var aNext=(idx+1<a.length)?a[idx+1]:maxScroll(from);
    var bNext=(idx+1<b.length)?b[idx+1]:maxScroll(to);
    var span=(aNext-a[idx])||1;
    var frac=Math.max(0,Math.min(1,(y-a[idx])/span));
    to.scrollTop = b[idx] + frac*(bNext-b[idx]);
  } else {
    var d=maxScroll(from)||1; to.scrollTop=(from.scrollTop/d)*maxScroll(to);
  }
  requestAnimationFrame(function(){lock=false;});
}
sides.L.scroll.addEventListener("scroll",function(){mirror(sides.L.scroll,sides.R.scroll);});
sides.R.scroll.addEventListener("scroll",function(){mirror(sides.R.scroll,sides.L.scroll);});

/* ---------- live captions + translation (side panels) ---------- */
var capOn=false, rec=null, translator=null, translatorReady=false;
var enLines=[], frLines=[];
var capBtn=document.getElementById("capBtn"), capStatus=document.getElementById("capStatus");
var panelEn=document.getElementById("panel-en"), panelFr=document.getElementById("panel-fr");
var panEl={en:document.querySelector(".panel-en"), fr:document.querySelector(".panel-fr")};

function setStatus(t){ capStatus.textContent=t||""; }

async function initTranslator(){
  try{
    if("Translator" in self){
      var av=await Translator.availability({sourceLanguage:"en",targetLanguage:"fr"});
      if(av!=="unavailable"){ translator=await Translator.create({sourceLanguage:"en",targetLanguage:"fr"}); translatorReady=true; }
    } else if(self.translation && self.translation.createTranslator){
      translator=await self.translation.createTranslator({sourceLanguage:"en",targetLanguage:"fr"}); translatorReady=true;
    }
  }catch(e){ translatorReady=false; }
}
initTranslator();

async function translateFr(text){
  if(translatorReady && translator){ try{ return await translator.translate(text); }catch(e){} }
  try{
    var r=await fetch("https://api.mymemory.translated.net/get?q="+encodeURIComponent(text)+"&langpair=en|fr");
    var j=await r.json();
    if(j && j.responseData && j.responseData.translatedText) return j.responseData.translatedText;
  }catch(e){}
  return null;
}

function renderPanel(el, lines, interim){
  if(!lines.length && !interim){ el.innerHTML='<div class="ph">'+(el===panelFr?'La traduction appara\u00EEtra ici.':'Your spoken words will appear here.')+'</div>'; return; }
  var html=lines.slice(-40).map(function(t){ return '<div class="line">'+esc(t)+'</div>'; }).join("");
  if(interim) html+='<div class="line interim">'+esc(interim)+'</div>';
  el.innerHTML=html;
  el.scrollTop=el.scrollHeight;
}

function onResult(ev){
  var interim="", finalTxt="";
  for(var i=ev.resultIndex;i<ev.results.length;i++){
    var r=ev.results[i];
    if(r.isFinal) finalTxt+=r[0].transcript; else interim+=r[0].transcript;
  }
  renderPanel(panelEn, enLines, interim);
  if(finalTxt.trim()){
    var sentence=finalTxt.trim();
    enLines.push(sentence); renderPanel(panelEn, enLines, "");
    var idx=frLines.push("\u2026")-1; renderPanel(panelFr, frLines, "");
    translateFr(sentence).then(function(fr){ frLines[idx]=fr||sentence; renderPanel(panelFr, frLines, ""); });
  }
}

var failCount=0, startedAt=0;
function startCaps(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ setStatus("Live captions need Chrome or Edge on desktop."); return; }
  if(location.protocol==="file:"){ setStatus("Opened as a local file \u2014 the mic will keep re-asking. Host it on https:// (GitHub Pages) or localhost, then open that link."); return; }
  if(!window.isSecureContext){ setStatus("Not a secure page. Open it over https:// (GitHub Pages) or localhost."); return; }
  failCount=0;
  rec=new SR(); rec.lang="en-US"; rec.continuous=true; rec.interimResults=true;
  rec.onresult=function(ev){ failCount=0; onResult(ev); };
  rec.onstart=function(){ startedAt=Date.now(); setStatus("Listening \u2014 speak in English"); };
  rec.onerror=function(e){
    if(e.error==="no-speech"||e.error==="aborted") return;      // benign
    if(e.error==="network"){ setStatus("Reconnecting\u2026"); return; }  // transient: let onend restart
    capOn=false;
    var msg={
      "not-allowed":"Microphone blocked. Click the lock/mic icon in the address bar \u2192 Allow, on an https:// page.",
      "service-not-allowed":"Speech service blocked. Use https:// and allow the microphone.",
      "audio-capture":"No microphone found. Check it's connected and selected."
    }[e.error] || ("Microphone error: "+e.error);
    setStatus(msg); resetBtn();
  };
  rec.onend=function(){
    if(!capOn) return;
    if(Date.now()-startedAt < 400) failCount++; else failCount=0;   // only count truly instant fails
    if(failCount>=6){ capOn=false; setStatus("Speech service unavailable. Check connection, then press Start."); resetBtn(); return; }
    setTimeout(function(){ if(capOn){ try{ rec.start(); }catch(e){} } }, 500);
  };
  capOn=true; panEl.en.classList.add("recording"); panEl.fr.classList.add("recording");
  capBtn.textContent="\u25A0 Stop captions"; capBtn.classList.add("live");
  setStatus("Starting\u2026 allow the microphone when asked.");
  try{ rec.start(); }catch(e){ setStatus("Could not start: "+e.message); capOn=false; resetBtn(); }
}
function resetBtn(){
  panEl.en.classList.remove("recording"); panEl.fr.classList.remove("recording");
  capBtn.textContent="\uD83C\uDFA4 Start live captions"; capBtn.classList.remove("live");
}
function stopCaps(){
  capOn=false; if(rec){ try{ rec.stop(); }catch(e){} }
  resetBtn(); setStatus("");
}
capBtn.onclick=function(){ capOn?stopCaps():startCaps(); };

/* ---------- mirrored pointers: follow the matching word/section ---------- */
(function(){
  var screens=document.querySelectorAll(".screen");
  if(screens.length<2) return;
  var cur=[document.getElementById("cur-L"), document.getElementById("cur-R")];
  function setCur(k,x,y){ cur[k].style.left=x+"px"; cur[k].style.top=y+"px"; cur[k].classList.add("on"); }
  function hide(){ cur[0].classList.remove("on"); cur[1].classList.remove("on"); }
  function relTwin(host,e,twin,os){
    var hr=host.getBoundingClientRect();
    var fx=(e.clientX-hr.left)/(hr.width||1), fy=(e.clientY-hr.top)/(hr.height||1);
    fx=Math.max(0,Math.min(1,fx)); fy=Math.max(0,Math.min(1,fy));
    var tr=twin.getBoundingClientRect(), sr=os.getBoundingClientRect();
    return { x:Math.max(10,Math.min(os.clientWidth-10,  tr.left-sr.left+fx*tr.width)),
             y:Math.max(10,Math.min(os.clientHeight-10, tr.top -sr.top +fy*tr.height)) };
  }
  for(var i=0;i<2;i++){
    (function(idx){
      var s=screens[idx], other=idx===0?1:0, os=screens[other];
      s.addEventListener("mousemove",function(e){
        var sr=s.getBoundingClientRect();
        setCur(idx, e.clientX-sr.left, e.clientY-sr.top);              // real pointer
        var host=e.target && e.target.closest ? e.target.closest("[data-sync]") : null;
        if(host){
          var twin=os.querySelector('[data-sync="'+host.getAttribute("data-sync")+'"]');
          if(twin){ var c=relTwin(host,e,twin,os); setCur(other,c.x,c.y); return; }  // proportional within twin
        }
        var rx=(e.clientX-sr.left)/sr.width, ry=(e.clientY-sr.top)/sr.height;         // fallback
        setCur(other, rx*os.clientWidth, ry*os.clientHeight);
      });
      s.addEventListener("mouseleave",hide);
    })(i);
  }
})();

goHome();
