<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICF-SL · Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#004080; --navy-700:#003468; --navy-900:#012a52;
    --gold:#ffc107; --gold-600:#e0a800;
    --ink:#12233b; --muted:#5c7089; --line:#e2e9f2; --bg:#f4f7fb; --white:#fff;
    --sh-sm:0 2px 8px rgba(0,64,128,.08); --sh-md:0 12px 30px rgba(0,64,128,.14); --sh-lg:0 26px 60px rgba(0,64,128,.28);
    --disp:'Oswald',system-ui,sans-serif; --body:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:var(--body);color:var(--ink);line-height:1.5;background:#ffffff;display:flex;align-items:center;justify-content:center;padding:20px;}
  a{text-decoration:none;color:inherit;}

  /* Phone frame */
  .phone{width:400px;max-width:100%;height:860px;max-height:96vh;background:#0a1c30;border-radius:46px;padding:12px;box-shadow:var(--sh-lg);}
  .screen{position:relative;width:100%;height:100%;background:var(--bg);border-radius:36px;overflow:hidden;display:flex;flex-direction:column;}
  @media(max-width:520px){body{padding:0;}.phone{width:100%;height:100vh;max-height:none;border-radius:0;padding:0;}.screen{border-radius:0;}}

  /* Header */
  .top{flex:0 0 auto;background:var(--white);border-bottom:3px solid var(--navy);display:flex;align-items:center;gap:11px;padding:12px 16px;box-shadow:var(--sh-sm);z-index:10;}
  .top .logo{height:40px;width:auto;display:block;}
  .top .brand{border-left:2px solid var(--line);padding-left:11px;min-width:0;}
  .top .brand .n{font:600 14px/1 var(--disp);letter-spacing:.03em;color:var(--navy);text-transform:uppercase;}
  .top .brand .s{font:500 9.5px/1.2 var(--body);color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .top .home-link{margin-left:auto;font:600 12px var(--body);color:var(--navy);display:none;align-items:center;gap:5px;cursor:pointer;padding:8px 11px;border-radius:9px;border:1.5px solid var(--line);flex:0 0 auto;}
  .top .home-link.show{display:inline-flex;}
  .top .home-link:active{background:var(--bg);}

  /* Scroll body */
  .body{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}

  /* Hero */
  .hero{background:linear-gradient(155deg,var(--navy),var(--navy-900));color:#fff;border-radius:0 0 26px 26px;position:relative;overflow:hidden;padding:26px 22px 30px;}
  .hero::after{content:"";position:absolute;right:-50px;top:-60px;width:190px;height:190px;border-radius:50%;background:rgba(255,193,7,.13);}
  .hero::before{content:"";position:absolute;right:60px;bottom:-90px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.06);}
  .hero .tag{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.22);padding:6px 12px;border-radius:99px;font:600 10px var(--body);letter-spacing:.07em;text-transform:uppercase;position:relative;}
  .hero .tag .g{width:7px;height:7px;border-radius:50%;background:var(--gold);}
  .hero h1{font:600 25px/1.16 var(--disp);letter-spacing:.01em;margin:14px 0 11px;position:relative;}
  .hero h1 span{color:var(--gold);}
  .hero p{font:400 13px/1.6 var(--body);color:rgba(255,255,255,.92);position:relative;}
  .hero .stats{display:flex;gap:22px;margin-top:22px;position:relative;}
  .hero .stats .st .v{font:700 22px/1 var(--disp);color:var(--gold);}
  .hero .stats .st .k{font:500 10.5px var(--body);color:rgba(255,255,255,.82);margin-top:5px;}

  .wrap{padding:0 18px;}
  .sec-head{display:flex;align-items:baseline;gap:12px;margin:24px 2px 16px;}
  .sec-head h2{font:600 19px/1 var(--disp);letter-spacing:.02em;color:var(--navy);}
  .sec-head .bar{flex:1;height:2px;background:var(--line);}
  .sec-head .count{font:600 11px var(--body);color:var(--muted);}

  /* Module cards (single column) */
  .grid{display:flex;flex-direction:column;gap:14px;padding-bottom:30px;}
  .mod{background:var(--white);border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh-sm);cursor:pointer;overflow:hidden;position:relative;transition:transform .12s,box-shadow .2s,border-color .2s;}
  .mod::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--navy);}
  .mod:active{transform:scale(.99);}
  .mod .body2{padding:17px 17px 17px 21px;}
  .mod .num{font:700 11px var(--disp);letter-spacing:.1em;color:var(--gold-600);}
  .mod h3{font:600 18px/1.22 var(--disp);color:var(--ink);margin:5px 0 8px;}
  .mod p{font:400 12.5px/1.5 var(--body);color:var(--muted);}
  .mod .foot{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid var(--line);}
  .mod .foot .sub{font:600 10.5px var(--body);color:var(--muted);}
  .mod .foot .go{display:inline-flex;align-items:center;gap:5px;font:600 12px var(--body);color:var(--navy);}

  /* Detail */
  .detail{padding-bottom:34px;animation:fade .3s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .dhero{background:linear-gradient(150deg,var(--navy),var(--navy-700));color:#fff;border-radius:18px;padding:22px;margin:18px 0 18px;position:relative;overflow:hidden;}
  .dhero::after{content:"";position:absolute;right:-40px;top:-50px;width:150px;height:150px;border-radius:50%;background:rgba(255,193,7,.15);}
  .dhero .num{font:700 11px var(--disp);letter-spacing:.12em;color:var(--gold);position:relative;}
  .dhero h2{font:600 23px/1.18 var(--disp);margin:7px 0 9px;position:relative;}
  .dhero p{font:400 13px/1.6 var(--body);color:rgba(255,255,255,.9);position:relative;}

  .subs{display:flex;flex-direction:column;gap:13px;}
  .sub-card{background:var(--white);border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh-sm);padding:18px;display:flex;flex-direction:column;transition:transform .12s,box-shadow .2s;}
  .sub-card:active{transform:scale(.99);}
  .sub-card .ic{width:50px;height:50px;border-radius:14px;display:grid;place-items:center;margin-bottom:13px;}
  .ic.ppt{background:#fdeede;color:#d1671a;} .ic.vid{background:#e7effb;color:var(--navy);}
  .ic.ass{background:#fff6d9;color:var(--gold-600);} .ic.dat{background:#e4f5ec;color:#1f9d6b;}
  .sub-card .step{font:700 10.5px var(--disp);letter-spacing:.1em;color:var(--muted);}
  .sub-card h4{font:600 17px/1.2 var(--disp);margin:4px 0 6px;}
  .sub-card p{font:400 12.5px/1.5 var(--body);color:var(--muted);margin-bottom:15px;}
  .sub-card .btn{border:none;border-radius:12px;padding:13px 15px;font:600 14px var(--body);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .08s,filter .2s;}
  .sub-card .btn:active{transform:translateY(1px);}
  .btn-navy{background:var(--navy);color:#fff;} .btn-gold{background:var(--gold);color:var(--navy-900);}
  .btn-green{background:#1f9d6b;color:#fff;} .btn-orange{background:#d1671a;color:#fff;}

  .player{background:#000;border-radius:16px;overflow:hidden;box-shadow:var(--sh-md);display:none;}
  .player.show{display:block;animation:fade .3s ease;}
  .player video{width:100%;display:block;max-height:46vh;background:#000;}
  .player .pbar{background:var(--navy-900);color:#fff;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;font:600 11.5px var(--body);}
  .player .pbar button{background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:6px 11px;font:600 11.5px var(--body);cursor:pointer;}

  .note{background:#fff8e1;border:1px solid #f4e2a8;border-radius:12px;padding:13px 15px;font:400 12px/1.55 var(--body);color:#7a5c00;margin-top:20px;}
  .note b{font-weight:700;} .note code{background:#fbeecb;padding:1px 5px;border-radius:5px;font-size:11px;}

  footer{background:var(--navy-900);color:rgba(255,255,255,.7);text-align:center;padding:20px;font:400 11px var(--body);}
  footer b{color:#fff;font-weight:600;}
</style>
</head>

  {key:'ppt',file:'presentation.pptx',step:'Sub-module 1',ic:'ppt',title:'Presentation',desc:'PowerPoint walkthrough of the app and workflow.',btn:'Open presentation',cls:'btn-orange'},
  {key:'video',file:'video.mp4',step:'Sub-module 2',ic:'vid',title:'Video',desc:'Recorded demonstration (.mp4) of how to use the app.',btn:'Play video',cls:'btn-navy'},
  {key:'assessment',file:'assessment.html',step:'Sub-module 3',ic:'ass',title:'Assessment',desc:'Short assessment to confirm understanding before fieldwork.',btn:'Start assessment',cls:'btn-gold'},
  {key:'data',file:'data-collection.html',step:'Sub-module 4',ic:'dat',title:'Data Collection',desc:'Launch the live data-collection form (.html).',btn:'Open data collection',cls:'btn-green'}
];
const IC={
  ppt:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M12 17v4M8 21h8"/><path d="M7 11l3-2 3 3 4-4"/></svg>',
  vid:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M10 9l5 3-5 3z" fill="currentColor" stroke="none"/></svg>',
  ass:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l2 2 4-4"/><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M9 3v2h6V3"/></svg>',
  dat:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M9 6h6M9 10h6M9 14h4"/></svg>',
  arrow:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>'
};

const view=document.getElementById('view');
const scroller=document.getElementById('scroll');
function toTop(){ scroller.scrollTop=0; }
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function showHome(){
  document.getElementById('homeLink').classList.remove('show'); toTop();
  view.innerHTML=`
    <section class="hero">
      <span class="tag"><span class="g"></span>School Based Distribution of ITNs</span>
      <h1>Field tools and Training for <span>School Based Distribution of ITNs</span></h1>
      <p>Open a module to find its presentation, a demo video, a readiness assessment, and the live data collection form in order. Built by ICF-SL for Sierra Leone&rsquo;s national programmes.</p>
      <div class="stats">
        <div class="st"><div class="v">${MODULES.length}</div><div class="k">Modules</div></div>
        <div class="st"><div class="v">4</div><div class="k">Steps each</div></div>
        <div class="st"><div class="v">Live</div><div class="k">Sheets sync</div></div>
      </div>
    </section>
    <div class="wrap">
      <div class="sec-head"><h2>Modules</h2><span class="bar"></span><span class="count">${MODULES.length}</span></div>
      <div class="grid">
        ${MODULES.map((m,i)=>`
          <div class="mod" onclick="showModule(${i})"><div class="body2">
            <div class="num">MODULE ${String(i+1).padStart(2,'0')}</div>
            <h3>${esc(m.title)}</h3>
            <p>${esc(m.desc)}</p>
            <div class="foot"><span class="sub">4 sub-modules</span><span class="go">Open ${IC.arrow}</span></div>
          </div></div>`).join('')}
      </div>
    </div>`;
}

function showModule(i){
  const m=MODULES[i];
  document.getElementById('homeLink').classList.add('show'); toTop();
  view.innerHTML=`
    <div class="wrap"><div class="detail">
      <div class="dhero"><div class="num">MODULE ${String(i+1).padStart(2,'0')}</div><h2>${esc(m.title)}</h2><p>${esc(m.desc)}</p></div>
      <div class="subs">
        ${SUBS.map(s=>`<div class="sub-card">
          <div class="ic ${s.ic}">${IC[s.ic]}</div>
          <div class="step">${s.step}</div><h4>${s.title}</h4><p>${s.desc}</p>
          <button class="btn ${s.cls}" onclick="openSub('${s.key}',${i})">${s.btn}</button>
        </div>`).join('')}
        <div class="player" id="player">
          <div class="pbar"><span>Video &middot; ${esc(m.title)}</span><button onclick="closePlayer()">Close &times;</button></div>
          <video id="vid" controls preload="metadata"></video>
        </div>
      </div>
    </div></div>`;
}

function openSub(key,i){
  const m=MODULES[i];
  const sub=SUBS.filter(function(s){return s.key===key;})[0];
  const url=m.folder+'/'+sub.file;
  if(key==='video'){
    const p=document.getElementById('player'),v=document.getElementById('vid');
    v.src=url; p.classList.add('show'); p.scrollIntoView({behavior:'smooth',block:'center'}); v.play().catch(()=>{});
    return;
  }
  window.open(url,'_blank');
}
function closePlayer(){ const p=document.getElementById('player'),v=document.getElementById('vid'); v.pause(); v.removeAttribute('src'); v.load(); p.classList.remove('show'); }

showHome();
</script>
</body>
</html>
